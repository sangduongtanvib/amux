name: Deploy to cloud.amux.io

on:
  push:
    branches: [main]
    paths:
      - 'amux-server.py'
      - 'cloud/gateway/gateway.py'
      - 'cloud/docker/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.CLOUD_SSH_KEY }}" > ~/.ssh/amux_cloud
          chmod 600 ~/.ssh/amux_cloud
          ssh-keyscan -H 5.161.66.217 >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy amux-server.py (shared mount for all containers)
        run: |
          rsync -e "ssh -i ~/.ssh/amux_cloud" amux-server.py \
            root@5.161.66.217:/opt/amux-cloud/app/amux-server.py
          # Touch to trigger auto-restart in all running containers
          ssh -i ~/.ssh/amux_cloud root@5.161.66.217 \
            'touch /opt/amux-cloud/app/amux-server.py && echo "amux-server.py deployed"'

      - name: Deploy gateway.py
        run: |
          rsync -e "ssh -i ~/.ssh/amux_cloud" cloud/gateway/gateway.py \
            root@5.161.66.217:/opt/amux-cloud/gateway/gateway.py
          ssh -i ~/.ssh/amux_cloud root@5.161.66.217 \
            'systemctl restart amux-gateway && echo "gateway restarted"'

      - name: Deploy docker-compose template
        run: |
          rsync -e "ssh -i ~/.ssh/amux_cloud" cloud/docker/docker-compose.template.yml \
            root@5.161.66.217:/opt/amux-cloud/docker/docker-compose.template.yml
